name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only token; no writes needed for running tests.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Install pytest
        run: uv pip install pytest

      - name: Run tests
        run: uv run pytest -q

      - name: Verify CLI entry point
        run: uv run ghstars --help
